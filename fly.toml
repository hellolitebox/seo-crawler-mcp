app = "seo-crawler-mcp"
primary_region = "iad"

[build]

[mounts]
  source = "crawl_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/jobs/healthcheck"
    timeout = "5s"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
