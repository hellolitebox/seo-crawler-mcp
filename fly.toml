# fly.toml app configuration file generated for seo-crawler-mcp on 2026-05-06T17:26:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'seo-crawler-mcp'
primary_region = 'gru'

[build]
  [build.args]
    GO_VERSION = '1.25.0'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
