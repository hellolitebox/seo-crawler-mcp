app = "seo-crawler-mcp"
primary_region = "iad"

[build]

[mounts]
  source = "crawl_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[vm]
  # 4GB needed because Chromium gets killed by OOM on shared-cpu-1x/512MB during
  # JS-heavy crawls. performance-2x gives 2 dedicated cores + 4GB.
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2
