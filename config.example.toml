# SEO Crawler MCP — Configuration File
# Copy to config.toml and customize as needed.
# All values shown are defaults unless noted.

# --- Crawl scope ---
# scope_mode = "registrable_domain"  # exact_host | registrable_domain | subdomain
# allowed_hosts = []                  # Additional hosts to include in scope

# --- Limits ---
# max_pages = 10000
# max_depth = 50
# max_query_variants_per_path = 50

# --- Network ---
# user_agent = "seo-crawler-mcp/0.1"
# request_timeout = "10s"
# retries = 1
# max_redirect_hops = 10
# per_host_concurrency = 2
# global_concurrency = 8

# --- Rendering ---
# render_mode = "hybrid"    # static | hybrid
# render_provider = "auto"  # auto | local | browserbase
# render_wait_ms = 2000
# max_browser_instances = 2
# browser_render_timeout = "30s"
# browserbase_api_key = ""      # optional; prefer BROWSERBASE_API_KEY env var
# browserbase_project_id = ""   # optional; prefer BROWSERBASE_PROJECT_ID env var

# --- Content thresholds ---
# title_max_length = 60
# title_min_length = 30
# description_max_length = 160
# description_min_length = 70
# thin_content_threshold = 200
# deep_page_threshold = 3

# --- PageSpeed Insights (optional, requires Google API key) ---
# psi_api_key = "your_key_here"
# psi_desktop = false         # Enable desktop audits alongside mobile

# --- LanguageTool (optional, requires running server) ---
# languagetool_url = "http://localhost:8010"

# --- Database ---
# db_path = "seo-crawler.db"

# --- Rate limiting ---
# max_concurrent_crawls = 3
# max_jobs_per_hour = 20
